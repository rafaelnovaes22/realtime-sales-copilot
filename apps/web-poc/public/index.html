<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>POC Deepgram — Acme Forja Comercial</title>
    <style>
      :root {
        --bg: #0b0d10;
        --panel: #14181d;
        --border: #1f262d;
        --fg: #e6e9ee;
        --fg-dim: #8b95a3;
        --accent: #5eead4;
        --interim: #8b95a3;
        --final: #e6e9ee;
        --danger: #f87171;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 14px/1.5 ui-monospace, "SF Mono", Menlo, monospace;
        background: var(--bg);
        color: var(--fg);
        padding: 24px;
        max-width: 960px;
        margin-inline: auto;
      }
      h1 { font-size: 18px; font-weight: 600; margin: 0 0 4px; }
      .sub { color: var(--fg-dim); margin-bottom: 24px; }

      .controls {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 16px;
      }
      button {
        font: inherit;
        padding: 10px 18px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--fg);
        cursor: pointer;
      }
      button:hover:not(:disabled) { border-color: var(--accent); }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      button.primary { background: var(--accent); color: #0b0d10; border-color: var(--accent); }

      .stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        margin-bottom: 16px;
      }
      .stat {
        background: var(--panel);
        border: 1px solid var(--border);
        padding: 8px 12px;
        border-radius: 6px;
      }
      .stat-label { color: var(--fg-dim); font-size: 11px; text-transform: uppercase; }
      .stat-value { font-size: 18px; font-weight: 600; margin-top: 2px; }

      #transcript {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 16px;
        min-height: 320px;
        white-space: pre-wrap;
        font-size: 15px;
        line-height: 1.6;
      }
      .interim { color: var(--interim); font-style: italic; }
      .final { color: var(--final); }

      #log {
        margin-top: 16px;
        max-height: 200px;
        overflow-y: auto;
        font-size: 12px;
        color: var(--fg-dim);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px;
      }
      #log .err { color: var(--danger); }

      select {
        font: inherit;
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--fg);
      }

      .panes {
        display: grid;
        grid-template-columns: 1fr 380px;
        gap: 12px;
      }

      #suggestions-panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 16px;
        min-height: 320px;
        max-height: 70vh;
        overflow-y: auto;
      }

      #suggestions-panel h2 {
        margin: 0 0 8px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--fg-dim);
      }

      .suggestion-card {
        background: var(--bg);
        border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        border-radius: 6px;
        padding: 12px;
        margin-bottom: 10px;
        animation: slide-in 200ms ease-out;
      }

      @keyframes slide-in {
        from { transform: translateX(8px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }

      .suggestion-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 8px;
        font-size: 11px;
        color: var(--fg-dim);
      }

      .gatilho-badge {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1px 8px;
        color: var(--accent);
      }

      .suggestion-text {
        font-size: 14px;
        line-height: 1.5;
        color: var(--fg);
        margin-bottom: 10px;
      }

      .suggestion-actions {
        display: flex;
        gap: 6px;
      }

      .suggestion-actions button {
        padding: 4px 10px;
        font-size: 12px;
        background: var(--panel);
        border: 1px solid var(--border);
      }

      .suggestion-actions button.accept:hover { border-color: #22c55e; color: #22c55e; }
      .suggestion-actions button.reject:hover { border-color: var(--danger); color: var(--danger); }
      .suggestion-actions button.dismiss:hover { border-color: var(--fg-dim); }

      .suggestion-card.handled { opacity: 0.5; }

      .placeholder { color: var(--fg-dim); font-style: italic; font-size: 13px; }

      .status-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #4a525a;
        margin-right: 6px;
      }
      .status-dot.live { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
    </style>
  </head>
  <body>
    <h1>POC — Captura de áudio + Deepgram Streaming</h1>
    <div class="sub">
      <span class="status-dot" id="dot"></span><span id="status">Pronto</span>
    </div>

    <div class="controls">
      <button id="start" class="primary">Iniciar captura</button>
      <button id="stop" disabled>Parar</button>
      <select id="estado-select" title="Etapa atual da conversa">
        <option value="abertura">abertura</option>
        <option value="diagnostico" selected>diagnóstico</option>
        <option value="apresentacao">apresentação</option>
        <option value="objecao">objeção</option>
        <option value="fechamento">fechamento</option>
      </select>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Latência STT</div>
        <div class="stat-value" id="lat-avg">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Latência sugestão</div>
        <div class="stat-value" id="lat-suggest">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Transcrições finais</div>
        <div class="stat-value" id="finals">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Sugestões emitidas</div>
        <div class="stat-value" id="suggestions-count">0</div>
      </div>
    </div>

    <div class="panes">
      <div id="transcript"></div>
      <div id="suggestions-panel">
        <h2>Sugestões</h2>
        <div id="suggestions-body">
          <p class="placeholder">As sugestões aparecem aqui quando um gatilho é detectado.</p>
        </div>
      </div>
    </div>

    <div id="log"></div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
